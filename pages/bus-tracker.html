<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="nav.bus_tracker">एस.टी. बस ट्रॅकर // ST Bus Tracker</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sky: #0ea5e9;
            --rose: #f43f5e;
            --amber: #f59e0b;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
        }

        .module-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* Module Navigation Header */
        .module-header {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
            transition: background 0.2s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Main Workspace Split Grid */
        .tracker-workspace {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 1.75rem;
        }

        @media (max-width: 1024px) {
            .tracker-workspace {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Controls Panel */
        .control-panel {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            height: calc(100vh - 200px);
            overflow-y: auto;
        }

        .search-select {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 0.75rem 1rem;
            border-radius: 0.875rem;
            width: 100%;
            outline: none;
            font-family: inherit;
        }

        /* Transit Schedule Timeline Cards */
        .bus-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .bus-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .bus-card:hover,
        .bus-card.active {
            background: rgba(14, 165, 233, 0.08);
            border-color: rgba(14, 165, 233, 0.3);
        }

        .status-badge {
            font-size: 0.6875rem;
            padding: 0.25rem 0.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-live {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
        }

        .status-delayed {
            background: rgba(245, 158, 11, 0.15);
            color: #f59e0b;
        }

        /* Integrated Leaflet Canvas Map Box */
        .map-wrapper {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 1rem;
            position: relative;
            height: calc(100vh - 200px);
        }

        #bus-map {
            width: 100%;
            height: 100%;
            border-radius: 1rem;
            background: #1e293b;
        }
    </style>
</head>

<body>

    <div class="module-container">
        <header class="module-header">
            <div style="display: flex; align-items: center; gap: 1rem;">
                <a href="javascript:history.back()" class="back-btn">
                    <i data-lucide="arrow-left" style="width:16px; height:16px;"></i>
                    <span data-i18n="actions.back">मुख्य पृष्ठ</span>
                </a>
                <h2 style="margin:0; font-size:1.25rem; font-weight:700;" data-i18n="nav.bus_tracker">एस.टी. बस थेट
                    ट्रॅकिंग मंचा</h2>
            </div>
            <div>
                <i data-lucide="bus" style="color: var(--sky); width: 28px; height: 28px;"></i>
            </div>
        </header>

        <main class="tracker-workspace">

            <section class="control-panel no-scrollbar">
                <div>
                    <label style="font-size: 0.8125rem; color: var(--text-muted); display:block; margin-bottom:0.5rem;"
                        data-i18n="tracker.select_route">मार्ग निवडा / Select Route:</label>
                    <select class="search-select" id="route-filter">
                        <option value="all">सर्व मार्ग / All Routes</option>
                        <option value="kp-kop">कोल्हापूर - कागल / Kolhapur - Kagal</option>
                        <option value="kp-pnh">कोल्हापूर - पन्हाळा / Kolhapur - Panhala</option>
                    </select>
                </div>

                <div class="bus-list">
                    <h4 style="margin: 0 0 0.5rem 0; font-size: 0.875rem; color: var(--text-muted);"
                        data-i18n="tracker.active_buses">सक्रिय बसेस / Active Transits</h4>

                    <div class="bus-card active" onclick="focusBus(16.6934, 74.2422, 'MH-20-BL-4026')">
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                            <span style="font-weight:700; font-size:0.9rem;">MH-12-RN-4589</span>
                            <span class="status-badge status-live">थेट (Live)</span>
                        </div>
                        <p style="margin:0 0 0.25rem 0; font-size:0.8125rem;">कोल्हापूर एक्सप्रेस (Kolhapur Exp)</p>
                        <p style="margin:0; font-size:0.75rem; color:var(--text-muted);">पुढील थांबा: मध्यवर्ती बस
                            स्थानक (CBS)</p>
                    </div>

                    <div class="bus-card" onclick="focusBus(16.7050, 74.2433, 'MH-09-FL-1102')">
                        <div
                            style="display:flex; justify-content:space-between; align-items:center; margin-bottom:0.5rem;">
                            <span style="font-weight:700; font-size:0.9rem;">MH-09-FL-1102</span>
                            <span class="status-badge status-delayed">१० मि. उशीर</span>
                        </div>
                        <p style="margin:0 0 0.25rem 0; font-size:0.8125rem;">कागल लोकल (Kagal Local)</p>
                        <p style="margin:0; font-size:0.75rem; color:var(--text-muted);">पुढील थांबा: शिरोली नाका
                            (Shiroli)</p>
                    </div>
                </div>
            </section>

            <section class="map-wrapper">
                <div id="bus-map"></div>
            </section>

        </main>
    </div>

    <script>
        lucide.createIcons();

        // Establish centralized geospatial orientation parameters targeting Kolhapur baseline
        let map = L.map('bus-map').setView([16.7050, 74.2433], 13);

        // Render Dark-Mode Theme Tiles using OpenStreetMap wrappers
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
        }).addTo(map);

        // Global baseline tracking marker pointer array layout context
        let currentMarker = L.marker([16.7050, 74.2433]).addTo(map)
            .bindPopup('<b>MH-12-RN-4589</b><br>स्थानक ट्रॅकिंग सुरू.')
            .openPopup();

        // Core operational teleportation callback function
        function focusBus(lat, lng, plateNumber) {
            map.flyTo([lat, lng], 15, { animate: true, duration: 1.5 });
            currentMarker.setLatLng([lat, lng]);
            currentMarker.getPopup().setContent(`<b>${plateNumber}</b><br>थेट लोकेशन ट्रॅक अपडेटेड.`);
            currentMarker.openPopup();
        }
    </script>
</body>

</html>
