<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्रामऊर्जा प्रशासन नियंत्रण कक्ष // Authentication Gate</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../css/app.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #020617 0%, #0f172a 100%);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-blur: blur(20px);
            --sky: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1rem;
            box-sizing: border-box;
        }

        .auth-portal {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 2rem;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i:first-child {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .password-toggle {
            position: absolute;
            right: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
        }

        .login-input {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            padding: 1rem 3rem;
            border-radius: 1rem;
            width: 100%;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }

        .login-input:focus {
            border-color: var(--sky);
        }

        .submit-btn {
            background: var(--sky);
            color: #020617;
            border: none;
            padding: 1rem;
            border-radius: 1rem;
            width: 100%;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
        }

        .error-pills {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.2);
            color: #f43f5e;
            padding: 0.75rem;
            border-radius: 0.75rem;
            font-size: 0.8125rem;
            margin-bottom: 1.5rem;
            display: none;
            text-align: center;
        }
    </style>
</head>

<body>

    <div class="auth-portal">
        <div style="text-align: center; margin-bottom: 2.5rem;">
            <div
                style="display:inline-flex; padding:0.75rem; background:rgba(14,165,233,0.1); border-radius:1rem; color:var(--sky); margin-bottom:1rem;">
                <i data-lucide="shield-alert" style="width:32px; height:32px;"></i>
            </div>
            <h2 style="margin:0; font-size:1.5rem; font-weight:700;">प्रशासन लॉगइन</h2>
            <p style="margin:0.25rem 0 0 0; font-size:0.8125rem; color:var(--text-muted);">Unified Gateway Redirection
            </p>
        </div>

        <div class="error-pills" id="error-box"></div>

        <form onsubmit="processLogin(event)">
            <div class="input-group">
                <i data-lucide="user"></i>
                <input type="text" id="username" class="login-input" placeholder="वापरकर्ता नाव (Username)" required
                    autocomplete="off">
            </div>

            <div class="input-group">
                <i data-lucide="lock"></i>
                <input type="password" id="password" class="login-input" placeholder="पासवर्ड (Password)" required
                    style="padding-right: 3rem;">
                <button type="button" class="password-toggle" onclick="togglePasswordMask()">
                    <i data-lucide="eye" id="eye-icon"></i>
                </button>
            </div>

            <button type="submit" class="submit-btn">
                <span>नियंत्रण कक्षात प्रवेश करा</span>
                <i data-lucide="arrow-right" style="width:18px; height:18px;"></i>
        </form>
        <a href="../index.html" class="submit-btn" style="background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-main); margin-top: 1rem; text-decoration: none;">
            <i data-lucide="arrow-left" style="width:18px; height:18px;"></i>
            <span>मुख्य पृष्ठावर जा (Go Back)</span>
        </a>
    </div>

 <script>
    lucide.createIcons();

    function togglePasswordMask() {
        const passField = document.getElementById('password');
        const eyeIcon = document.getElementById('eye-icon');
        if (passField.type === "password") {
            passField.type = "text";
            eyeIcon.setAttribute('data-lucide', 'eye-off');
        } else {
            passField.type = "password";
            eyeIcon.setAttribute('data-lucide', 'eye');
        }
        lucide.createIcons();
    }

    async function processLogin(event) {
        event.preventDefault(); // Stop page from refreshing
        
        const user = document.getElementById('username').value.trim();
        const pass = document.getElementById('password').value;
        const errorBox = document.getElementById('error-box');
        const submitBtn = document.querySelector('.submit-btn');
        
        errorBox.style.display = "none";
        submitBtn.innerHTML = `<span>प्रतीक्षा करा...</span>`; // Loading state
        submitBtn.disabled = true;

        const payload = { username: user, password: pass };

        try {
            // Send credentials securely to the backend API
            const response = await fetch('login-api.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (!response.ok) throw new Error("Network Error");
            
            const result = await response.json();

            if (result.status === "success") {
                // Backend verified the hash and provided the exact dashboard URL
                window.location.href = result.redirect;
            } else {
                // Display error (e.g., Wrong Password)
                errorBox.style.display = "block";
                errorBox.textContent = result.message;
                
                // Reset button
                submitBtn.innerHTML = `<span>नियंत्रण कक्षात प्रवेश करा</span><i data-lucide="arrow-right" style="width:18px; height:18px;"></i>`;
                submitBtn.disabled = false;
                lucide.createIcons();
            }
        } catch (error) {
            console.error("Login System Failed:", error);
            errorBox.style.display = "block";
            errorBox.textContent = "सर्व्हरशी संपर्क होऊ शकला नाही. पुन्हा प्रयत्न करा.";
            
            submitBtn.innerHTML = `<span>नियंत्रण कक्षात प्रवेश करा</span><i data-lucide="arrow-right" style="width:18px; height:18px;"></i>`;
            submitBtn.disabled = false;
            lucide.createIcons();
        }
    }
</script>
</body>

</html>
