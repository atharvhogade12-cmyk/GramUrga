<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्रामऊर्जा // GramUrja — Digital Village Governance</title>
    <meta name="description" content="ग्रामऊर्जा — गावातील सर्व सरकारी व सार्वजनिक सुविधा एकाच ठिकाणी.">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <div class="app-shell">
        <!-- SIDEBAR -->
        <nav id="sidebar" class="sidebar collapsed no-scrollbar">
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1.5rem">
                <div style="padding:0.625rem;background:var(--sky);border-radius:0.875rem;display:flex">
                    <i data-lucide="zap" style="width:20px;height:20px;color:var(--bg-primary);stroke-width:2.5"></i>
                </div>
                <div>
                    <h1 style="font-size:1.125rem;font-weight:700;line-height:1.2" data-i18n="app_name">ग्रामऊर्जा</h1>
                    <p style="font-size:0.5625rem;color:var(--sky);letter-spacing:0.1em;text-transform:uppercase;font-weight:600" data-i18n="app_tagline">आपलं गाव, आपली सेवा</p>
                </div>
            </div>
            <div class="lang-switcher" style="margin-bottom:1.25rem">
                <button class="lang-btn active" data-lang="mr">मराठी</button>
                <button class="lang-btn" data-lang="hi">हिंदी</button>
                <button class="lang-btn" data-lang="en">EN</button>
            </div>
            <div style="flex:1;display:flex;flex-direction:column;gap:0.125rem">
                <a class="nav-item" data-page="dashboard" onclick="Router.navigate('dashboard')"><i data-lucide="layout-dashboard"></i> <span data-i18n="nav.dashboard">डॅशबोर्ड</span></a>
                <div class="nav-section" data-i18n="nav.services">सेवा</div>
                <a class="nav-item" data-page="power" onclick="Router.navigate('power')"><i data-lucide="bolt"></i> <span data-i18n="nav.power">ऊर्जा ग्रीड</span></a>
                <a class="nav-item" data-page="water" onclick="Router.navigate('water')"><i data-lucide="droplet"></i> <span data-i18n="nav.water">जल वाहिनी</span></a>
                <a class="nav-item" data-page="agriculture" onclick="Router.navigate('agriculture')"><i data-lucide="sprout"></i> <span data-i18n="nav.agriculture">कृषी उन्नती</span></a>
                <a class="nav-item" data-page="sanitation" onclick="Router.navigate('sanitation')"><i data-lucide="trash-2"></i> <span data-i18n="nav.sanitation">स्वच्छ ग्राम</span></a>
                <a class="nav-item" data-page="grievance" onclick="Router.navigate('grievance')"><i data-lucide="scale"></i> <span data-i18n="nav.grievance">ई-चौपाल</span></a>
                <a class="nav-item" data-page="news" onclick="Router.navigate('news')"><i data-lucide="newspaper"></i> <span data-i18n="nav.news">बातमीपत्र</span></a>
                <a class="nav-item" data-page="weather" onclick="Router.navigate('weather')"><i data-lucide="cloud-sun"></i> <span data-i18n="nav.weather">हवामान</span></a>
                <div class="nav-section" data-i18n="nav.ai_tools">AI साधने</div>
                <a class="nav-item" data-page="crop-diagnosis" onclick="Router.navigate('crop-diagnosis')"><i data-lucide="scan-search"></i> <span data-i18n="nav.crop_diagnosis">पीक निदान</span></a>
                <a class="nav-item" data-page="market-chat" onclick="Router.navigate('market-chat')"><i data-lucide="message-square-text"></i> <span data-i18n="nav.market_chat">बाजारभाव चॅट</span></a>
                <div class="nav-section" data-i18n="nav.transport">वाहतूक</div>
                <a class="nav-item" data-page="bus-tracker" onclick="Router.navigate('bus-tracker')"><i data-lucide="bus"></i> <span data-i18n="nav.bus_tracker">बस ट्रॅकर</span></a>
                <div class="nav-section" data-role-min="admin" data-i18n="nav.admin">प्रशासन</div>
                <a class="nav-item" data-page="analytics" data-role-min="admin" onclick="Router.navigate('analytics')"><i data-lucide="bar-chart-3"></i> <span data-i18n="nav.analytics">विश्लेषण</span></a>
            </div>
            <div style="margin-top:auto;padding-top:1rem;border-top:1px solid var(--border-glass)">
                <div style="display:flex;align-items:center;gap:0.625rem;padding:0.625rem 0;margin-bottom:0.5rem">
                    <div style="width:32px;height:32px;border-radius:50%;background:rgba(14,165,233,0.15);display:flex;align-items:center;justify-content:center;color:var(--sky);font-weight:700;font-size:0.75rem" id="user-avatar">?</div>
                    <div><p style="font-size:0.75rem;font-weight:600" id="user-name">—</p><p style="font-size:0.5625rem;color:var(--text-muted)" id="user-role">—</p></div>
                </div>
                <a class="nav-item" onclick="Auth.logout()" style="color:var(--rose)"><i data-lucide="log-out"></i> <span data-i18n="nav.logout">बाहेर पडा</span></a>
                <div style="display:flex;justify-content:space-between;font-size:0.5625rem;color:var(--text-muted);font-family:monospace;margin-top:0.75rem"><span>v2.0.26</span><span>Kolhapur, MH</span></div>
            </div>
        </nav>

        <!-- MAIN -->
        <main class="main-content no-scrollbar" style="margin-left:0">
            <div id="mobile-header" style="display:none;align-items:center;justify-content:space-between;margin-bottom:1rem">
                <button id="sidebar-toggle" class="btn btn-ghost" style="padding:0.625rem"><i data-lucide="menu" style="width:20px;height:20px"></i></button>
                <span style="font-weight:700" data-i18n="app_name">ग्रामऊर्जा</span>
                <div style="width:36px"></div>
            </div>
            <div id="page-content" class="page-enter"></div>
        </main>
    </div>

    <button id="tts-fab" class="tts-fab" title="पृष्ठ वाचा"><i data-lucide="volume-2" style="width:22px;height:22px"></i></button>

    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/pages-core.js"></script>
    <script src="js/pages-services.js"></script>
    <script src="js/pages-more.js"></script>
    <script src="js/pages-ai.js"></script>
    <script src="js/pages-bus.js"></script>
    <script src="js/modules.js"></script>
    <script src="js/bus-tracker.js"></script>
    <script src="js/app.js"></script>
    <script>
        const mq = window.matchMedia('(max-width:1024px)');
        function uMH() { const m = document.getElementById('mobile-header'); if(m) m.style.display = mq.matches ? 'flex' : 'none'; }
        mq.addEventListener('change', uMH); uMH();
        window.addEventListener('hashchange', () => {
            const s = Auth.getSession();
            if(s) { const n=document.getElementById('user-name'); if(n) n.textContent=s.name; const r=document.getElementById('user-role'); if(r) r.textContent=s.role; const a=document.getElementById('user-avatar'); if(a) a.textContent=s.name.charAt(0); }
        });
    </script>
</body>
</html>
