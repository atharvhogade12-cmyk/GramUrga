<!DOCTYPE html>
<html lang="mr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ग्रामऊर्जा // GramUrja — Digital Village Governance</title>
    <meta name="description" content="ग्रामऊर्जा — गावातील सर्व सरकारी व सार्वजनिक सुविधा एकाच ठिकाणी.">
    <meta name="theme-color" content="#0ea5e9">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/app.css">
    <style>
        /* Modern Glassmorphic Dashboard Styles */
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(16px);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sky: #0ea5e9;
            --emerald: #10b981;
            --amber: #f59e0b;
        }

        body { background: var(--bg-gradient); color: var(--text-main); font-family: 'Poppins', sans-serif; margin: 0; min-height: 100vh; }
        .landing-container { max-width: 1400px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* Glassmorphic Navbar */
        .glass-nav {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .brand-box { display: flex; align-items: center; gap: 0.75rem; }
        .brand-icon { padding: 0.625rem; background: var(--sky); border-radius: 0.875rem; display: flex; color: #0f172a; }

        /* Metrics Grid */
        .telemetry-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; }
        
        .stat-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.25rem;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }
        .stat-card:hover { transform: translateY(-4px); border-color: rgba(14, 165, 233, 0.4); }
        .stat-icon { width: 54px; height: 54px; border-radius: 1rem; display: flex; align-items: center; justify-content: center; }

        /* Dynamic Wards Grid */
        .dynamic-wards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1rem;
            margin-bottom: 3.5rem;
        }
        .ward-badge {
            background: rgba(255,255,255,0.02);
            border: 1px solid var(--glass-border);
            border-radius: 1rem;
            padding: 1rem;
            transition: transform 0.2s;
        }
        .ward-badge:hover { transform: translateY(-3px); border-color: rgba(14, 165, 233, 0.3); }

        /* Core Services Grid */
        .services-section-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 0.5rem; }
        .services-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 1.75rem; }
        
        .service-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 2rem;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .service-card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(14, 165, 233, 0.1) 0%, transparent 100%);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .service-card:hover { transform: scale(1.02); border-color: rgba(14, 165, 233, 0.3); box-shadow: 0 12px 40px rgba(14, 165, 233, 0.1); }
        .service-card:hover::before { opacity: 1; }
        
        .service-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
        .action-btn {
            background: rgba(14, 165, 233, 0.15);
            border: 1px solid rgba(14, 165, 233, 0.3);
            color: var(--sky);
            padding: 0.5rem 1rem;
            border-radius: 0.75rem;
            font-size: 0.8125rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.375rem;
            transition: all 0.2s ease;
            text-decoration: none;
        }
        .service-card:hover .action-btn { background: var(--sky); color: #0f172a; }
    </style>
</head>

<body>
    <div id="toast-container"></div>
    <div id="page-content"></div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="js/i18n.js"></script>
    <script src="js/auth.js"></script>
    
    <script src="js/pages-core.js"></script>
    <script src="js/pages-services.js"></script>
    <script src="js/pages-more.js"></script>
    <script src="js/pages-ai.js"></script>
    <script src="js/pages-bus.js"></script>
    
    <script src="js/bus-tracker.js"></script>
    <script src="js/modules.js"></script>
    
    <script src="js/app.js"></script>
    
    <script>
        // Safe Lucide initialization after all scripts are loaded
        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }
    </script>
</body>
</html>
